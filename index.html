<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquema de Ahorro - Meta 5.000.000</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div>
            <h1>💸Esquema de Ahorro</h1>
        </div>
        <div class="goal-panel">
            <div class="goal-row">
                <span class="label">Ahorrado:</span>
                    <div class="value total-value">
                        <span id="total-amount" class="value-amount">$0</span>
                        <button
                            id="toggle-total-visibility"
                            class="toggle-total-btn"
                            type="button"
                            aria-pressed="false"
                            aria-label="Ocultar saldo total"
                        >
                            Ocultar
                        </button>
                    </div>
            </div>
            <div class="goal-row">
                <span class="label">Meta:</span>
                <span class="value">$5.000.000</span>
            </div>
            <div class="goal-row goal-daily">
                <span class="label">Plan (7 meses):</span>
                <span id="daily-goal" class="value"></span>
            </div>
            <div class="goal-row">
                <span class="label">Hoy:</span>
                <span id="today-date" class="value"></span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <span id="progress-percent" class="progress-percent">0%</span>
            </div>
            <p id="motivation-text" class="motivation-text">
                Empieza marcando tu primer billete y mira cómo crece tu ahorro.
            </p>
        </div>
    </header>

    <main class="app-main">
        <section class="denomination-section">
            <div class="section-header">
                <h2>Todos los billetes mezclados</h2>
                <span class="section-summary" id="overall-summary">0 billetes ahorrados</span>
            </div>
            <div class="bills-grid bills-mixed" id="all-bills-grid"></div>
        </section>
    </main>
    <footer class="app-footer">
        <button id="reset-button" class="reset-button">Reiniciar progreso</button>
    </footer>

    <audio id="cash-sound" src="cash.mp3" preload="auto"></audio>
    
    <script src="script.js"></script>
</body>
</html>
